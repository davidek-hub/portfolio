<!DOCTYPE html>
<html lang="cs">
	<head>
		<meta charset="UTF-8">
			<title>Cookie Clicker</title>
			<link rel="stylesheet" href="cookieclicker.css">
</head>
	<body>
		<div class="game-container">
			<h1>Cookie Clicker</h1>
			<h2>
				Upečeno sušenek: <span id="skore">0</span>
			</h2>
			<h3 id="text-cps">Za sekundu: 0</h3>

			<div class="cookie-wrapper">
				<button id="btn-susenka" class="main-cookie">🍪</button>
				<div id="popups-container"></div>
			</div>

			<div id="risk-zone">
				<button id="btn-zlaty">Zlatá sušenka (Risk!)</button>
			</div>

			<hr>

				<div id="obchod" style="display: none;">
					<h3>Obchod s upgrady</h3>
					<button id="btn-babicka" style="display: none;">Najmout Babičku (Cena: 10)</button>
					<button id="btn-tovarna" style="display: none;">Koupit Továrnu (Cena: 50)</button>
					<button id="btn-dul" style="display: none;">Důl na čokoládu (Cena: 200)</button>
				</div>
			</div>
		<script src="cookieclicker.js"></script>
	</body>
</html>
